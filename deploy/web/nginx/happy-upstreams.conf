# Kubernetes node upstreams for Happy-Improved web.
#
# Mirrors the benjamins / quietplan k8s-upstreams shape — same three public
# nodes (dell-home / guru-eu / guru-us), same weighting (3 / 3 / 1),
# least_conn for the stateless static frontend.
#
# NodePort:
#   happy_frontend -> 30082  (happy-web NodePort Service, namespace `happy`)
#
# The Service must be type NodePort with nodePort 30082 (see
# deploy/web/k8s/service.yaml) so this upstream stays static.

upstream happy_frontend {
    least_conn;
    # dell3930-1 (81.99.40.60) is behind the TP-Link home router; its
    # NodePorts only reach the edge if the router forwards them (as it does
    # for 30080/30081/30088/... today). 30082 is NOT forwarded yet, so the
    # dell node is omitted. To add it: forward TCP 30082 -> 192.168.0.94 on
    # the TP-Link, then uncomment the line below.
    # server 81.99.40.60:30082   max_fails=2 fail_timeout=20s weight=3;
    server 89.125.50.58:30082  max_fails=2 fail_timeout=20s weight=3;
    server 89.125.255.36:30082 max_fails=2 fail_timeout=20s weight=2;
    keepalive 32;
}
