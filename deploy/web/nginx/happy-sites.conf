# Edge nginx site for Happy-Improved — happy.ahposten.com.
#
# Serves the static Expo web export (proxied to the in-cluster nginx via the
# happy_frontend NodePort upstream). The web app is a pure client: it opens a
# WebSocket/HTTP connection directly from the browser to the Happy relay
# (default https://api.cluster-fluster.com), so the edge only needs to serve
# the static bundle — there is no API subdomain to proxy here.
#
# TLS comes from certbot on the edge VM (Let's Encrypt, HTTP-01 via the
# already-running edge nginx). Issue one-time with:
#   sudo certbot certonly --nginx -d happy.ahposten.com
# Renewal is automatic via the existing certbot.timer.
#
# NOTE: deliberately no restrictive Content-Security-Policy here. The client
# connects cross-origin to the relay (and optionally LiveKit / ElevenLabs for
# voice); a tight connect-src would break pairing. Add one later only if you
# pin every endpoint the app talks to.

server {
    server_name happy.ahposten.com;
    access_log /var/log/nginx/access.log json_combined;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://happy_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/happy.ahposten.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/happy.ahposten.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name happy.ahposten.com;
    if ($host = happy.ahposten.com) { return 301 https://$host$request_uri; }
    return 404;
}
