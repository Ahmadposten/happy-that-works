# In-container nginx serving the Expo web export (SPA). Same behaviour as the
# inline config the old Dockerfile.webapp generated, extracted to a file.
#
# Caching: index.html must be no-cache (revalidate every load) — without it,
# browsers heuristically cache it and "new" windows keep booting stale JS
# bundles long after a deploy (this shipped a since-fixed settings-wipe bug to
# fresh windows). Hashed build output under /_expo/ is immutable.
server {
    listen 80;

    location /_expo/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
    location /.well-known/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ /index.html /index.htm =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        try_files $uri @redirect_to_index;
        internal;
    }

    error_page 404 = @handle_404;
    location @handle_404 {
        root /usr/share/nginx/html;
        try_files /404.html @redirect_to_index;
        internal;
    }
    location @redirect_to_index {
        return 302 /;
    }
}
