# Happy-Improved web frontend Deployment.
#
# Static Expo web export served by nginx (built by Dockerfile.webapp at the
# repo root, in the kaniko "Build & Push" stage). Stateless — the web app is
# a pure client that pairs with the CLI/relay over the network, so replicas
# scale freely. Mirrors the benjamins-web Deployment shape.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-web
  namespace: happy
  labels:
    app: happy-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: happy-web
  template:
    metadata:
      labels:
        app: happy-web
    spec:
      containers:
        - name: web
          image: ahmadposten/happy-improved-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: GIT_SHA
              value: "__GIT_SHA__"     # sed-substituted by the Jenkinsfile Deploy stage
            - name: BUILD_TIME
              value: "__BUILD_TIME__"  # sed-substituted by the Jenkinsfile Deploy stage
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Dockerfile.webapp's nginx serves the SPA at "/" (no dedicated
          # /healthz), so probe the index route — a 200 proves nginx is up.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
