# NodePort Service exposing the Happy-Improved web frontend to the edge nginx
# VM (35.179.90.95). The edge upstream `happy_frontend`
# (deploy/web/nginx/happy-upstreams.conf) targets nodeIP:30082 across the
# public cluster nodes.
#
# 30082 is the next free port in the frontend 300xx convention
# (30080 quietplan, 30081 benjamins, 30088 jenkins are taken).
apiVersion: v1
kind: Service
metadata:
  name: happy-web
  namespace: happy
  labels:
    app: happy-web
    tier: frontend
spec:
  type: NodePort
  selector:
    app: happy-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30082
      protocol: TCP
