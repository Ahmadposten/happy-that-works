# Edge nginx site for happy-server's object storage — files.happy.ahposten.com.
#
# Fronts in-cluster MinIO (happy_files upstream, NodePort 30903). happy-server
# mints presigned PUT/GET URLs signed for THIS host, so the browser / mobile app
# / CLI talk straight to MinIO through here. The S3 SigV4 signature covers the
# Host header, so we pass `Host $host` through unchanged.
#
# TLS from certbot:
#   sudo certbot certonly --nginx -d files.happy.ahposten.com
#
# Uploads are the encrypted attachment blobs (up to the 100 MB app cap), so the
# body limit is large and request buffering is off (stream straight to MinIO).

server {
    server_name files.happy.ahposten.com;
    access_log /var/log/nginx/access.log json_combined;

    # Attachment blobs up to the 100 MB client cap; 0 = no nginx-side limit
    # (MinIO's presigned POST policy still enforces content-length-range).
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        proxy_pass http://happy_files;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Preserve Host so the S3 SigV4 presigned signature validates.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/files.happy.ahposten.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.happy.ahposten.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name files.happy.ahposten.com;
    if ($host = files.happy.ahposten.com) { return 301 https://$host$request_uri; }
    return 404;
}
