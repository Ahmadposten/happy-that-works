# Kubernetes node upstreams for the self-hosted happy-server + its MinIO.
# Mirrors deploy/web/nginx/happy-upstreams.conf (same public nodes, weighting).
#
# NodePorts (namespace `happy`):
#   happy_api   -> 30083  (happy-server Service)
#   happy_files -> 30903  (happy-minio-nodeport Service, S3 API :9000)
#
# dell3930-1 (81.99.40.60) is behind the home router; its NodePorts only reach
# the edge if forwarded (30083/30903 are not forwarded yet), so it's omitted —
# same as the web upstream. guru-eu / guru-us are public control-plane nodes;
# kube-proxy routes the NodePort to the pod wherever it actually runs.

upstream happy_api {
    least_conn;
    # server 81.99.40.60:30083   max_fails=2 fail_timeout=20s weight=3;  # add after router-forwarding 30083
    server 89.125.50.58:30083  max_fails=2 fail_timeout=20s weight=3;
    server 89.125.255.36:30083 max_fails=2 fail_timeout=20s weight=2;
    keepalive 32;
}

upstream happy_files {
    least_conn;
    # server 81.99.40.60:30903   max_fails=2 fail_timeout=20s weight=3;  # add after router-forwarding 30903
    server 89.125.50.58:30903  max_fails=2 fail_timeout=20s weight=3;
    server 89.125.255.36:30903 max_fails=2 fail_timeout=20s weight=2;
    keepalive 32;
}
