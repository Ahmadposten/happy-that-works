# Edge nginx site for the self-hosted Happy relay API — api.happy.ahposten.com.
#
# Proxies to the happy_api NodePort upstream (happy-server). The mobile app +
# CLI open a socket.io WebSocket at /v1/updates, so this vhost is WebSocket-aware
# via the shared $connection_upgrade map (conf.d/00-websocket-map.conf).
#
# TLS from certbot on the edge VM:
#   sudo certbot certonly --nginx -d api.happy.ahposten.com
#
# Attachments do NOT flow through here — in S3 mode the client uploads/downloads
# bytes directly to files.happy.ahposten.com (MinIO) via presigned URLs. This
# vhost only carries the (small, encrypted-JSON) control API, so a modest body
# limit is fine.

server {
    server_name api.happy.ahposten.com;
    access_log /var/log/nginx/access.log json_combined;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://happy_api;
        proxy_http_version 1.1;

        # WebSocket upgrade (socket.io /v1/updates). $connection_upgrade is
        # defined in conf.d/00-websocket-map.conf.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        # Long read timeout so idle WebSockets aren't culled mid-session.
        proxy_read_timeout 3600s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/api.happy.ahposten.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.happy.ahposten.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.happy.ahposten.com;
    if ($host = api.happy.ahposten.com) { return 301 https://$host$request_uri; }
    return 404;
}
