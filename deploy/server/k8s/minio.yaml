# In-cluster MinIO — object storage for happy-server attachments (namespace `happy`).
#
# happy-server runs in S3 mode (S3_HOST set), so it hands the client browser /
# mobile app *presigned* PUT/GET URLs and never touches the bytes. Those
# presigned URLs are signed by the minio client for host `files.happy.ahposten.com`
# (S3_HOST), so MinIO must be reachable at that public host:
#
#   browser/mobile ──TLS──▶ edge nginx (files.happy.ahposten.com)
#                              └─▶ nodeIP:30903 ─▶ happy-minio Service :9000
#
# CORS: the web app PUTs cross-origin from happy.ahposten.com, so MinIO returns
# permissive CORS via MINIO_API_CORS_ALLOW_ORIGIN. (Native mobile ignores CORS.)
#
# Root creds come from Secret `happy-server-secret` (MINIO_ROOT_USER /
# MINIO_ROOT_PASSWORD == the S3_ACCESS_KEY / S3_SECRET_KEY happy-server uses).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: happy-minio-data
  namespace: happy
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-minio
  namespace: happy
  labels:
    app: happy-minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: happy-minio
  template:
    metadata:
      labels:
        app: happy-minio
    spec:
      nodeSelector:
        kubernetes.io/hostname: server-guru-eu
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: happy-server-secret
                  key: S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: happy-server-secret
                  key: S3_SECRET_KEY
            # Allow the web app origin(s) to run presigned cross-origin PUT/GET.
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              value: "https://happy.ahposten.com,http://localhost:8081,http://localhost:8082"
            # The public host clients reach MinIO through (behind the edge).
            - name: MINIO_SERVER_URL
              value: "https://files.happy.ahposten.com"
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: happy-minio-data
---
# ClusterIP for in-cluster access (server-side ops, health).
apiVersion: v1
kind: Service
metadata:
  name: happy-minio
  namespace: happy
  labels:
    app: happy-minio
spec:
  selector:
    app: happy-minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# NodePort so the edge nginx (files.happy.ahposten.com) can reach the S3 API
# on the public nodes. 30903 (30902 is benjamins' instrument-logos MinIO).
apiVersion: v1
kind: Service
metadata:
  name: happy-minio-nodeport
  namespace: happy
  labels:
    app: happy-minio
spec:
  type: NodePort
  selector:
    app: happy-minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      nodePort: 30903
