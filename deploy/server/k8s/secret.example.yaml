# TEMPLATE ONLY — do not commit real values, and do not `kubectl apply` this file.
#
# The Jenkins deployer Role in `happy` has NO access to Secrets (by design), so
# `happy-server-secret` is created out-of-band, once, by a cluster admin. The
# server + Postgres + MinIO manifests all read from it.
#
# Create it like this (values generated with `openssl rand`):
#
#   PGPW=$(openssl rand -hex 24)
#   kubectl -n happy create secret generic happy-server-secret \
#     --from-literal=HANDY_MASTER_SECRET="$(openssl rand -hex 48)" \
#     --from-literal=POSTGRES_PASSWORD="$PGPW" \
#     --from-literal=DATABASE_URL="postgresql://happy:$PGPW@happy-postgres:5432/happy?schema=public" \
#     --from-literal=S3_ACCESS_KEY="happy-$(openssl rand -hex 4)" \
#     --from-literal=S3_SECRET_KEY="$(openssl rand -hex 32)"
#
# Keys consumed:
#   HANDY_MASTER_SECRET  auth/encryption master secret (rotating it invalidates
#                        all existing device pairings — treat as permanent)
#   POSTGRES_PASSWORD    postgres superuser password (StatefulSet)
#   DATABASE_URL         Prisma connection string (server + migrate initContainer)
#   S3_ACCESS_KEY        MinIO root user  == server S3 access key
#   S3_SECRET_KEY        MinIO root pass  == server S3 secret key
apiVersion: v1
kind: Secret
metadata:
  name: happy-server-secret
  namespace: happy
type: Opaque
stringData:
  HANDY_MASTER_SECRET: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql://happy:REPLACE_ME@happy-postgres:5432/happy?schema=public"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
