# happy-server — the self-hosted Happy relay (namespace `happy`).
#
# Image: ahmadposten/happy-improved-server (built from Dockerfile.server by the
# kaniko Jenkins pipeline in deploy/server/Jenkinsfile). __GIT_SHA__ /
# __BUILD_TIME__ are substituted by the pipeline (sed) — same pattern as the web
# deployment. For a manual bootstrap apply, they're just informational env.
#
# initContainers gate startup on Postgres, run Prisma migrations, then confirm
# MinIO's public host is reachable (presigned URLs are signed for it, so it must
# be up before the server's bucketExists() call).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-server
  namespace: happy
  labels:
    app: happy-server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: happy-server
  template:
    metadata:
      labels:
        app: happy-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z happy-postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: migrate
          image: ahmadposten/happy-improved-server:latest
          workingDir: /repo/packages/happy-server
          command: ["sh", "-c", "pnpm exec prisma migrate deploy --schema=prisma/schema.prisma"]
          envFrom:
            - secretRef:
                name: happy-server-secret
      containers:
        - name: happy-server
          image: ahmadposten/happy-improved-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3005
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: DB_PROVIDER
              value: postgres
            - name: REDIS_URL
              value: redis://happy-redis:6379
            # Object storage (attachments). S3_HOST is the PUBLIC host so the
            # presigned URLs the server mints are reachable by browser/mobile.
            - name: S3_HOST
              value: files.happy.ahposten.com
            - name: S3_PORT
              value: "443"
            - name: S3_USE_SSL
              value: "true"
            - name: S3_REGION
              value: us-east-1
            - name: S3_BUCKET
              value: happy
            - name: S3_PUBLIC_URL
              value: https://files.happy.ahposten.com/happy
            - name: PUBLIC_URL
              value: https://api.happy.ahposten.com
            - name: METRICS_ENABLED
              value: "true"
            - name: GIT_SHA
              value: "__GIT_SHA__"
            - name: BUILD_TIME
              value: "__BUILD_TIME__"
          # DATABASE_URL, HANDY_MASTER_SECRET, S3_ACCESS_KEY, S3_SECRET_KEY,
          # POSTGRES_PASSWORD come from the out-of-band Secret.
          envFrom:
            - secretRef:
                name: happy-server-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { cpu: "2", memory: "1536Mi" }
